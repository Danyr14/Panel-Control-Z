<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invernadero-Z | Historial</title>

  <link rel="stylesheet" href="../CSS/dashboard.css">
  <link rel="stylesheet" href="../CSS/historial.css">

  <!-- Librerías necesarias -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js" defer></script>

  <!-- Tus scripts -->
  <script src="../js/fecha.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/historialfuncion.js?v=2" defer></script>
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="../frontend/index.html" class="nav-link">
          <span class="nav-icon">⌂</span>
          <span>Inicio</span>
        </a>

        <a href="../frontend/sensores.html" class="nav-link">
          <span class="nav-icon">⌘</span>
          <span>Sensores</span>
        </a>

        <a href="../frontend/control.html" class="nav-link">
          <span class="nav-icon">🛠</span>
          <span>Control manual</span>
        </a>

        <a href="../frontend/automatizacion.html" class="nav-link">
          <span class="nav-icon">⏻</span>
          <span>Automatización</span>
        </a>

        <a href="../frontend/historial.html" class="nav-link">
          <span class="nav-icon">◔</span>
          <span>Historial</span>
        </a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h1>Historial</h1>
          <p>Revisión de datos anteriores y registros históricos</p>
        </div>

        <div class="datetime-box">
          <div id="fecha-actual"></div>
          <div id="hora-actual"></div>
        </div>

        <div class="topbar-right">
          <button class="icon-btn" type="button" title="Notificaciones">
            <img src="../img/notification.png" alt="Notificaciones" class="nav-icon-img">
          </button>

          <button class="icon-btn" type="button" title="Configuración">
            <img src="../img/setting.png" alt="Configuración" class="nav-icon-img">
          </button>

          <button class="icon-btn" type="button" title="Perfil">
            <img src="../img/user.png" alt="Perfil" class="nav-icon-img">
          </button>

          <div class="user-box">
            <span class="user-name">Invernadero</span>
            <button class="icon-btn" type="button" title="Cerrar sesión">
              <img src="../img/logout.png" alt="Cerrar sesión" class="nav-icon-img">
            </button>
          </div>
        </div>
      </header>

      <div class="historial-container">

        <div class="grafica-wrapper">
          <div class="grafica-header">
            <h3>Evolución de sensores</h3>
            <p>Visualización del historial de datos reales guardados en MySQL</p>
          </div>

          <canvas id="historialChart" width="800" height="400"></canvas>
        </div>

        <div class="filtro-wrapper">
          <div class="filtro-header">
            <h3>Filtros</h3>
            <button class="btn-pdf" id="descargarPDF" type="button">
              PDF
            </button>
          </div>

          <div class="filtro-form">
            <div class="filtro-group">
              <label>Tipo de sensor</label>
              <select id="tipoSensor">
                <option value="temperatura">Temperatura</option>
                <option value="humedad_ambiente">Humedad ambiente</option>
                <option value="humedad_suelo">Humedad de suelo</option>
                <option value="calidad_aire">Calidad de aire</option>
              </select>
            </div>

            <div class="filtro-group">
              <label>Fecha inicio</label>
              <input type="date" id="fechaInicio">
            </div>

            <div class="filtro-group">
              <label>Fecha fin</label>
              <input type="date" id="fechaFin">
            </div>

            <div class="filtro-buttons">
              <button class="btn-aplicar" id="aplicarFiltros" type="button">Aplicar</button>
              <button class="btn-limpiar" id="limpiarFiltros" type="button">Limpiar</button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
</body>

</html>
